<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Товар #1</title>

  <!-- ВАЖНО: мы находимся в папке /products,
       поэтому к css идём через ../assets/style.css -->
  <link rel="stylesheet" href="../assets/style.css" />
</head>

<body>
  <div class="card">
    <!-- Верхний блок: картинка + название + цена -->
<div class="top">

  <!-- Картинка товара:
       ВАЖНО: путь начинается с ../ потому что файл в папке /products -->
  <div class="thumb thumb--lg">
    <img src="../assets/img/box.jpg" alt="Товар #1 — Коробка">
  </div>

  <!-- Текстовая часть: название и цена -->
  <div>
    <h1 class="title">“Коробка”</h1>
    <div class="price-big">1 990 ₽</div>
  </div>

</div>



    <!-- Описание товара -->
    <div class="desc">
      <p><b>Описание:</b> пример карточки товара на отдельной странице.</p>
      <ul>
        <li>Материал: картон</li>
        <li>Цвет: коричневый</li>
        <li>Назначение: упаковка / хранение</li>
      </ul>
    </div>

    <!-- Кнопка (демо действия) -->
    <button class="btn" onclick="alert('Добавлено в корзину (демо) 🧺')">
      Добавить в корзину
    </button>

    <!-- Ссылка назад (на главную) -->
    <div>
      <a class="back" href="../index.html">← Назад на главную</a>
    </div>
  </div>
</body>
</html>
